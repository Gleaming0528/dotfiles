"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

# ==================== Prompt 格式 ====================
# 第一行：目录 + git + 语言/工具 + K8s + 耗时
# 第二行：时间 + 输入光标
format = """
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$python\
$conda\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$time$character"""

right_format = ""

# ==================== 目录 ====================
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #0550ae"

# ==================== Git 分支 ====================
[git_branch]
format = "on [$symbol$branch]($style) "
style = "bold #6e40c9"

# ==================== Git 状态 ====================
[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #cf222e"

# ==================== 隐藏版本号 ====================
[golang]
format = 'lsp [$symbol]($style)'
style = "#00758f"

[nodejs]
format = 'lsp [$symbol]($style)'
style = "#3c873a"

[python]
format = 'lsp [$symbol($virtualenv)]($style) '
style = "#306998"
detect_extensions = ['.py']
detect_files = ['requirements.txt', 'pyproject.toml', 'setup.py', 'Pipfile', '__init__.py']
detect_folders = []

[rust]
format = 'lsp [$symbol]($style)'
style = "#a72145"

[java]
format = 'lsp [$symbol]($style)'
style = "#b07219"

[helm]
format = 'lsp [$symbol]($style)'
style = "#0f1689"

# ==================== Conda 环境 ====================
[conda]
format = '[$symbol$environment]($style) '
style = "bold #1a7f37"
ignore_base = false

# ==================== Docker ====================
[docker_context]
format = "co [$symbol$context]($style) "
style = "#1d63ed"
only_with_files = true

# ==================== Kubernetes ====================
[kubernetes]
disabled = false
format = '[☸ $context( \($namespace\))]($style) '
symbol = "☸ "
style = "bold #326ce5"

# ==================== 命令耗时 ====================
[cmd_duration]
min_time = 3_000
format = "took [$duration]($style) "
style = "bold #b45309"

# ==================== 时间 ====================
[time]
disabled = false
format = '[{](white)[$time](yellow)[}](white)'
time_format = "%H:%M"

# ==================== 输入符号 ====================
[character]
success_symbol = "[ ➭](#6e40c9)"
error_symbol = "[ ➭](bold #cf222e)"

# ==================== 关掉不需要的模块 ====================
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
